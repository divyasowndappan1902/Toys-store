<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Stackly</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .error-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      text-align: center;
      padding: 40px 20px;
    }
    .error-code {
      font-size: 10rem;
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
      margin-bottom: 30px;
      font-family: var(--font-heading);
      display: inline-block;
      text-shadow: 
        1px 1px 0px #0ea5e9,
        2px 2px 0px #0ea5e9,
        3px 3px 0px #0ea5e9,
        4px 4px 0px #0ea5e9,
        5px 5px 0px #0284c7,
        6px 6px 0px #0284c7,
        7px 7px 0px #0284c7,
        8px 8px 15px rgba(0,0,0,0.4);
      animation: float3d 4s ease-in-out infinite;
      transform-style: preserve-3d;
    }

    @keyframes float3d {
      0% { transform: translateY(0px) rotateX(15deg) rotateY(-15deg); }
      50% { transform: translateY(-25px) rotateX(-5deg) rotateY(15deg) scale(1.05); }
      100% { transform: translateY(0px) rotateX(15deg) rotateY(-15deg); }
    }
    .error-message {
      font-size: 2rem;
      color: var(--text-dark);
      margin-bottom: 20px;
      font-family: var(--font-heading);
    }
    .error-text {
      color: var(--text-light);
      margin-bottom: 40px;
      max-width: 500px;
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
  <!-- Preloader -->
  <div id="preloader"><div class="spinner"></div></div>

  <!-- Header -->
  <header>
    <div class="container navbar">
      <a href="index.html" class="logo"><img src="assets/stackly_logo.webp" alt="Stackly" style="height: 35px; vertical-align: middle;"></a>
      <nav class="nav-links" id="nav-links">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="blog.html">Blog</a>
        <a href="service.html">Service</a>
        <a href="contact.html">Contact</a>
        <a href="login.html" class="btn mobile-login-btn">Login</a>
      </nav>
      <div class="header-actions">
        <button class="btn" onclick="window.location.href='login.html'">Login</button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="error-container">
    <div class="error-code" data-aos="zoom-in">404</div>
    <h1 class="error-message" data-aos="fade-up" data-aos-delay="200">Oops! Page not found.</h1>
    <p class="error-text" data-aos="fade-up" data-aos-delay="400">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
    <div style="display: flex; gap: 15px; justify-content: center;" data-aos="fade-up" data-aos-delay="600">
      <button onclick="history.back()" class="btn btn-secondary">Go to Previous Page</button>
      <a href="index.html" class="btn">Back to Home</a>
    </div>
  </main>

  <!-- Footer -->
  <footer class="dark-footer">
    <div class="container">
      <div class="footer-bottom dark-bottom">
        <p>&copy; 2026 Stackly. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="js/script.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script><script>AOS.init({duration: 800, once: true, offset: 50});</script>
</body>
</html>
