<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Stackly</title>
  <meta name="description" content="Create a new Stackly account.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
  <!-- Preloader -->
  <div id="preloader"><div class="spinner"></div></div>

  <div class="split-screen">
    <!-- Left side: Visuals -->
    <div class="split-left">
      <div class="split-left-content">
        <h1>Join the Magic!</h1>
        <p>Create an account to start your journey into a world of endless fun and premium toys.</p>
      </div>
    </div>
    
    <!-- Right side: Form -->
    <div class="split-right">
      <a href="index.html" class="back-home">&larr; Back to Home</a>
      <div class="login-box">
        <div class="logo" style="justify-content: center; margin-bottom: 20px;"><img src="assets/stackly_logo.webp" alt="Stackly" style="height: 35px; vertical-align: middle;"></div>
        <h2 style="text-align: center; margin-bottom: 25px;">Create an account</h2>
        
        <!-- Premium Role Selection Toggle -->
        <div class="role-toggle-container" id="role-toggle-container">
          <div class="role-toggle-bg"></div>
          <div class="role-option active" id="role-customer">Customer</div>
          <div class="role-option" id="role-admin">Admin</div>
        </div>

        <form action="login.html" method="GET" id="signup-form">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="John Doe" required>
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="john@example.com" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
          </div>
          <div class="form-group">
            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" name="confirm-password" placeholder="••••••••" required>
          </div>
          <div class="form-btn">
            <button type="submit" class="btn" style="width: 100%;">Create Account</button>
          </div>
          <div style="text-align: center; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
            <p style="color: var(--text-light);">Already have an account? <a href="login.html" style="color: var(--secondary); font-weight: 700; margin-left: 5px;">Log In</a></p>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script><script>AOS.init({duration: 800, once: true, offset: 50});</script>
</body>
</html>
